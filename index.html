<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GetMinted</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1A1A2E;
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  color: #F0F4F8;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Top bar */
.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin-top: max(env(safe-area-inset-top, 16px), 16px);
  padding: 12px 20px 0;
  z-index: 10;
}

.wordmark {
  display: flex;
  align-items: center;
  gap: 8px;
}

.login-btn {
  position: absolute;
  right: 20px;
  top: 12px;
  background: none;
  border: none;
  color: #00C882;
  opacity: 0.5;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  padding: 6px 10px;
  letter-spacing: 0.3px;
  transition: opacity 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.login-btn:hover, .login-btn:active { opacity: 0.85; }

/* Character area */
.character-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  position: relative;
  min-height: 0;
  overflow: hidden;
}

/* Speech bubble */
.speech-bubble {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 200, 130, 0.12);
  border: 1px solid rgba(0, 200, 130, 0.25);
  border-radius: 20px;
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 500;
  color: #F0F4F8;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
  opacity: 1;
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 20;
  pointer-events: none;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 14px; height: 14px;
  background: rgba(0, 200, 130, 0.12);
  border-right: 1px solid rgba(0, 200, 130, 0.25);
  border-bottom: 1px solid rgba(0, 200, 130, 0.25);
}
.speech-bubble.pop {
  animation: bubblePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.speech-bubble.hidden { opacity: 0; pointer-events: none; }
@keyframes bubblePop {
  0% { transform: translateX(-50%) scale(0.7); opacity: 0; }
  100% { transform: translateX(-50%) scale(1); opacity: 1; }
}

/* Thinking dots in speech bubble */
.thinking-dots { display: inline-flex; gap: 4px; align-items: center; height: 20px; }
.thinking-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #00C882;
  opacity: 0.4;
  animation: dotPulse 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1.2); }
}

/* Stretch canvas overlay — ABOVE the blob wrapper */
#stretch-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 16;
}

/* Mint wrapper */
#mint-wrapper {
  position: relative;
  width: 180px; height: 180px;
  cursor: grab;
  z-index: 15;
  will-change: transform;
  flex-shrink: 0;
}
#mint-wrapper:active { cursor: grabbing; }

/* Blob body — NO CSS animations, all driven by JS springs */
.mint-blob {
  width: 180px;
  height: 180px;
  position: relative;
  will-change: transform;
}

.mint-blob-body {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: radial-gradient(ellipse at 35% 30%, #4DFFC0 0%, #00C882 40%, #008A5A 100%);
  box-shadow:
    inset 0 -8px 20px rgba(0, 80, 50, 0.3),
    inset 0 8px 20px rgba(77, 255, 192, 0.2),
    0 8px 40px rgba(0, 200, 130, 0.25),
    0 2px 10px rgba(0, 0, 0, 0.3);
  position: relative;
  overflow: hidden;
  will-change: border-radius, opacity;
  transition: opacity 0.15s ease;
}

/* Inner glow / highlight */
.mint-blob-body::before {
  content: '';
  position: absolute;
  top: 12%;
  left: 18%;
  width: 40%;
  height: 30%;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, transparent 70%);
  transform: rotate(-15deg);
  pointer-events: none;
}

.mint-blob-body::after {
  content: '';
  position: absolute;
  bottom: 15%;
  right: 15%;
  width: 25%;
  height: 20%;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(0,138,90,0.3) 0%, transparent 70%);
  pointer-events: none;
}

/* Shadow underneath */
.mint-shadow {
  position: absolute;
  bottom: -12px;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 16px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.25);
  filter: blur(6px);
  pointer-events: none;
  z-index: -1;
  will-change: transform, opacity;
}

/* Face container — positioned absolutely over blob center, above stretch canvas */
.mint-face {
  position: absolute;
  width: 180px;
  height: 180px;
  pointer-events: none;
  z-index: 18;
  will-change: transform;
}

.mint-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,130,0.15) 0%, transparent 70%);
  filter: blur(25px);
  pointer-events: none;
  z-index: -1;
}

/* Chat section */
/* IG Primary Input */
.ig-section {
  width: 100%;
  max-width: 420px;
  padding: 0 20px;
  padding-bottom: max(env(safe-area-inset-bottom, 20px), 20px);
  flex-shrink: 0;
  z-index: 10;
}
.ig-label {
  text-align: center;
  font-size: 1rem;
  font-weight: 600;
  color: #e8edf2;
  margin-bottom: 12px;
}
.ig-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.ig-input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(152,232,193,0.3);
  border-radius: 12px;
  padding: 0 14px;
  gap: 6px;
  transition: border-color 0.2s;
}
.ig-input-wrap:focus-within { border-color: #00C882; }
.ig-at { color: #00C882; font-weight: 700; font-size: 1.1rem; }
.ig-input-wrap input {
  background: transparent;
  border: none;
  outline: none;
  color: #e8edf2;
  font-size: 1rem;
  padding: 14px 0;
  width: 100%;
  font-family: inherit;
}
.ig-input-wrap input::placeholder { color: #4a5a68; }
.ig-build-btn {
  background: #00C882;
  color: #1A1A2E;
  border: none;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s, transform 0.1s;
  font-family: inherit;
}
.ig-build-btn:active { transform: scale(0.96); opacity: 0.85; }

/* Mint Chat Popup */
.mint-chat-popup {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 480px;
  max-height: 42vh;
  margin: 0 auto;
  background: #111417;
  border-top: 1px solid rgba(152,232,193,0.2);
  border-radius: 20px 20px 0 0;
  padding: 0 0 max(env(safe-area-inset-bottom,12px),12px);
  z-index: 100;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
}
.mint-chat-popup.open { transform: translateY(0); }
.mint-chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.chat-close-btn {
  background: none;
  border: none;
  color: #4a5a68;
  font-size: 1rem;
  cursor: pointer;
  padding: 4px 8px;
}
.chat-section {
  width: 100%;
  max-width: 420px;
  padding: 0 16px;
  padding-bottom: max(env(safe-area-inset-bottom, 12px), 12px);
  display: flex;
  flex-direction: column;
  z-index: 10;
  flex-shrink: 0;
}

.chat-history {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 180px;
  overflow-y: auto;
  padding: 8px 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chat-history::-webkit-scrollbar { display: none; }

.chat-msg {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  animation: msgSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes msgSlideIn {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

.chat-msg.mint { justify-content: flex-start; }
.chat-msg.user { justify-content: flex-end; }

.chat-msg .leaf-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(0,200,130,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}

.chat-msg .bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.4;
  word-wrap: break-word;
}

.chat-msg.mint .bubble {
  background: #252540;
  color: #F0F4F8;
  border-bottom-left-radius: 6px;
}
.chat-msg.user .bubble {
  background: #00C882;
  color: #1A1A2E;
  border-bottom-right-radius: 6px;
  font-weight: 500;
}

.chat-input-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.chat-input-bar input {
  flex: 1;
  padding: 14px 18px;
  background: #111417;
  border: 2px solid transparent;
  border-radius: 24px;
  color: #F0F4F8;
  font-size: 16px;
  font-weight: 400;
  font-family: inherit;
  outline: none;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
}
.chat-input-bar input::placeholder { color: #555e68; }
.chat-input-bar input:focus {
  border-color: #00C882;
  box-shadow: 0 0 0 3px rgba(0, 200, 130, 0.12);
}

.send-btn {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: #00C882;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.send-btn:active { transform: scale(0.9); background: #00b374; }
.send-btn:disabled { opacity: 0.4; cursor: default; }
.send-btn:disabled:active { transform: none; }
.send-btn svg { width: 20px; height: 20px; }

.disclaimer {
  font-size: 12px;
  color: #8A9AA8;
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.2px;
}

/* Particles */
.particle {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00C882;
  pointer-events: none;
  opacity: 0;
  z-index: 5;
}

/* Touch ripple */
.touch-ripple {
  position: fixed;
  width: 20px; height: 20px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 50;
  transform: translate(-50%, -50%) scale(0);
  opacity: 0.6;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease-out;
}
.touch-ripple.expand {
  transform: translate(-50%, -50%) scale(4);
  opacity: 0;
}

/* Blob arms for face-cover reaction */
.mint-arm {
  position: absolute;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: radial-gradient(ellipse at 35% 30%, #4DFFC0 0%, #00C882 50%, #008A5A 100%);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 3;
  top: 40%;
  opacity: 0;
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
  pointer-events: none;
}
.mint-arm.left-arm {
  left: -10px;
  transform: translateX(-20px) scale(0.5);
}
.mint-arm.right-arm {
  right: -10px;
  transform: translateX(20px) scale(0.5);
}
.mint-arm.left-arm.covering {
  opacity: 1;
  transform: translateX(30px) scale(1);
}
.mint-arm.right-arm.covering {
  opacity: 1;
  transform: translateX(-30px) scale(1);
}
</style>
</head>

  <div class="top-bar">

    <script>
    (function(){
      const w=['Tattoo Artists.','Barbers.','Nail Techs.','Photographers.','Stylists.','Piercers.','Lash Techs.','Creatives.'];

      function tick(){
        const word=w[wi];

    <div class="chat-history" id="chat-history"></div>
    <div class="chat-input-bar">

        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12L3 3l19 9-19 9 2-9zm0 0h8" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
(function() {
  // ═══════════════════════════════════════════════════════
  // SPRING PHYSICS ENGINE
  // ═══════════════════════════════════════════════════════
  class Spring {
    constructor(value = 0, stiffness = 0.15, damping = 0.72) {
      this.value = value;
      this.velocity = 0;
      this.target = value;
      this.stiffness = stiffness;
      this.damping = damping;
    }
    update() {
      const force = (this.target - this.value) * this.stiffness;
      this.velocity = this.velocity * this.damping + force;
      this.value += this.velocity;
      return this.value;
    }
    impulse(v) {
      this.velocity += v;
    }
    isSettled() {
      return Math.abs(this.velocity) < 0.0005 && Math.abs(this.target - this.value) < 0.0005;
    }
  }

  // ═══════════════════════════════════════════════════════
  // DOM REFS
  // ═══════════════════════════════════════════════════════
  const CONVEX_URL = 'https://curious-lemming-262.convex.site/api/mint/chat';
  let threadId = null;

  // IG handle submit
  window.igSubmit = function() {
    const val = document.getElementById('ig-input').value.trim().replace(/^@/, '');
    if (!val) { document.getElementById('ig-input').focus(); return; }
    window.location.href = 'https://getminted.ai/dashboard/?ig=' + encodeURIComponent(val);
  };
  document.addEventListener('DOMContentLoaded', function() {
    const igInput = document.getElementById('ig-input');
    if (igInput) igInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') window.igSubmit(); });
  });

  // Mint chat popup
  const mintChatMessages = [
    "Hey! 👀 I already know your vibe from your IG. Want me to build your site real quick?",
    "Psst — drop your handle above and I'll have your site ready before you finish this sentence 🚀",
    "No cap, I built 164 sites already. Yours would take me 30 seconds ✨",
    "Your competitors have websites. Do you? 😤 Let me fix that.",
    "What if your Instagram actually sent people somewhere? I can make that happen — free 💚",
  ];
  let chatPopupShown = false;
  window.closeMintChat = function() {
    document.getElementById('mint-chat-popup').classList.remove('open');
  };
  window.openMintChat = function() {
    const popup = document.getElementById('mint-chat-popup');
    popup.classList.add('open');
    if (!chatPopupShown) {
      chatPopupShown = true;
      const msg = mintChatMessages[Math.floor(Math.random() * mintChatMessages.length)];
      setTimeout(() => addMessage(msg, 'mint'), 300);
    }
  };
  // Auto-open after 3 seconds
  setTimeout(window.openMintChat, 3000);

  // Push IG section up when chat opens so it stays visible
  window.openMintChat = (function(orig) {
    return function() {
      orig();
      document.getElementById('app').style.paddingBottom = '42vh';
    };
  })(window.openMintChat);
  window.closeMintChat = (function(orig) {
    return function() {
      orig();
      document.getElementById('app').style.paddingBottom = '';
    };
  })(window.closeMintChat);

  const wrapper = document.getElementById('mint-wrapper');
  const blob = document.getElementById('mint-blob');
  const blobBody = document.getElementById('mint-blob-body');
  const shadow = document.getElementById('mint-shadow');
  const bubble = document.getElementById('speech-bubble');
  const zone = document.getElementById('character-zone');
  const face = document.getElementById('mint-face');
  const chatInput = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const chatHistory = document.getElementById('chat-history');

  // Face elements
  const eyeLeftPupil = document.getElementById('eye-left-pupil');
  const eyeRightPupil = document.getElementById('eye-right-pupil');
  const eyeLeftHighlight = document.getElementById('eye-left-highlight');
  const eyeRightHighlight = document.getElementById('eye-right-highlight');
  const eyeLeftWhite = document.getElementById('eye-left-white');
  const eyeRightWhite = document.getElementById('eye-right-white');
  const eyeLeftLid = document.getElementById('eye-left-lid');
  const eyeRightLid = document.getElementById('eye-right-lid');
  const mouth = document.getElementById('mouth');
  const browLeft = document.getElementById('brow-left');
  const browRight = document.getElementById('brow-right');
  const sparkles = document.getElementById('sparkles');

  const LEFT_EYE = { cx: 66, cy: 78 };
  const RIGHT_EYE = { cx: 114, cy: 78 };
  const MAX_PUPIL_OFFSET = 6;

  let conversationHistory = [];
  let isSending = false;
  let hasAskedForHandle = false;
  let currentExpression = 'idle';
  let isTrackingMouse = false;
  let mouseX = 0, mouseY = 0;

  // ═══════════════════════════════════════════════════════
  // SPRING INSTANCES — THE HEART OF THE PHYSICS
  // ═══════════════════════════════════════════════════════

  // Position springs (for drag & return-to-center)
  const springPosX = new Spring(0, 0.08, 0.78);
  const springPosY = new Spring(0, 0.08, 0.78);

  // Deformation springs (for squish/stretch) — underdamped for Flubber feel
  const springScaleX = new Spring(1, 0.18, 0.55);  // bouncy!
  const springScaleY = new Spring(1, 0.18, 0.55);

  // Rotation spring (for tilt during drag)
  const springRotation = new Spring(0, 0.1, 0.65);

  // Idle float spring
  const springFloat = new Spring(0, 0.02, 0.92);

  // Eye lag springs (face reacts AFTER body)
  const springEyeX = new Spring(0, 0.08, 0.7);
  const springEyeY = new Spring(0, 0.08, 0.7);

  // Jiggle system — separate springs for organic wobble
  const springJiggle1 = new Spring(0, 0.12, 0.6);
  const springJiggle2 = new Spring(0, 0.15, 0.58);

  // ═══════════════════════════════════════════════════════
  // BLOB SHAPE MORPHING (organic, multi-frequency sin waves)
  // ═══════════════════════════════════════════════════════
  let morphTime = 0;
  const MORPH_POINTS = 8; // control points around the blob

  function getOrganicBorderRadius(t) {
    // Generate 8 "radius" values using layered sine waves
    const radii = [];
    for (let i = 0; i < MORPH_POINTS; i++) {
      const noise =
        Math.sin(t * 1.3 + i * 2.1) * 8 +
        Math.sin(t * 0.7 + i * 3.7) * 5 +
        Math.sin(t * 2.1 + i * 1.3) * 3;
      radii.push(50 + noise); // base 50% ± organic noise
    }
    // CSS border-radius: TL TR BR BL / TL TR BR BL
    return `${radii[0]}% ${radii[1]}% ${radii[2]}% ${radii[3]}% / ${radii[4]}% ${radii[5]}% ${radii[6]}% ${radii[7]}%`;
  }

  // ═══════════════════════════════════════════════════════
  // DRAG & INTERACTION STATE
  // ═══════════════════════════════════════════════════════
  let isDragging = false;
  let dragStartX = 0, dragStartY = 0;
  let dragOffsetX = 0, dragOffsetY = 0;

  // Velocity tracking (last N positions for smooth velocity calc)
  const velocityHistory = [];
  const VELOCITY_SAMPLES = 5;
  let lastDragX = 0, lastDragY = 0;
  let lastDragTime = 0;

  // Pressed state for squish
  let isPressed = false;
  let pressStartTime = 0;

  // ═══════════════════════════════════════════════════════
  // STRETCH DEFORMATION SYSTEM
  // ═══════════════════════════════════════════════════════
  const stretchCanvas = document.getElementById('stretch-canvas');
  const stretchCtx = stretchCanvas.getContext('2d');
  let isStretching = false;
  let stretchFingerX = 0, stretchFingerY = 0;
  const springStretch = new Spring(0, 0.25, 0.45); // bouncy snap-back
  const springStretchAngle = new Spring(0, 0.12, 0.65);
  let stretchAngle = 0;
  let stretchReleaseJiggle = 0; // extra jiggle on snap-back
  const MAX_STRETCH_DIST = 160; // max pixels you can stretch
  const BLOB_RADIUS = 90;
  let stretchActive = false; // true when canvas is rendering the stretch
  let stretchDragStarted = false; // differentiate tap from drag

  function resizeStretchCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = zone.getBoundingClientRect();
    stretchCanvas.width = rect.width * dpr;
    stretchCanvas.height = rect.height * dpr;
    stretchCanvas.style.width = rect.width + 'px';
    stretchCanvas.style.height = rect.height + 'px';
    stretchCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeStretchCanvas();
  window.addEventListener('resize', resizeStretchCanvas);

  function getBlobCenter() {
    const wrapperRect = wrapper.getBoundingClientRect();
    const zoneRect = zone.getBoundingClientRect();
    return {
      x: wrapperRect.left + wrapperRect.width / 2 - zoneRect.left,
      y: wrapperRect.top + wrapperRect.height / 2 - zoneRect.top
    };
  }

  function drawStretchBlob(blobX, blobY, fingerX, fingerY, stretch) {
    const ctx = stretchCtx;
    const canvasRect = zone.getBoundingClientRect();
    ctx.clearRect(0, 0, canvasRect.width, canvasRect.height);

    if (stretch < 0.02) return;

    const dx = fingerX - blobX;
    const dy = fingerY - blobY;
    const dist = Math.hypot(dx, dy) || 1;
    const angle = Math.atan2(dy, dx);
    const perp = angle + Math.PI / 2;

    // How far the tendril tip extends
    const tendrilDist = dist * stretch;
    const tipX = blobX + Math.cos(angle) * tendrilDist;
    const tipY = blobY + Math.sin(angle) * tendrilDist;

    // Volume conservation — body squishes slightly as you stretch
    const bodyR = BLOB_RADIUS * (1 - stretch * 0.15);

    // Neck width: wide at base, narrows toward tip
    const neckBase = bodyR * (0.55 - stretch * 0.25);
    const neckTip = Math.max(4, bodyR * (0.15 - stretch * 0.05));

    ctx.save();

    // === Draw main blob body (slight elongation toward pull) ===
    ctx.beginPath();
    ctx.save();
    ctx.translate(blobX, blobY);
    ctx.rotate(angle);
    ctx.scale(1 - stretch * 0.1, 1 + stretch * 0.05);
    ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
    ctx.restore();

    // Radial gradient for the main body
    const blobGrad = ctx.createRadialGradient(
      blobX - bodyR * 0.3, blobY - bodyR * 0.35, 0,
      blobX, blobY, bodyR * 1.1
    );
    blobGrad.addColorStop(0, '#6EFFD4');
    blobGrad.addColorStop(0.35, '#00C882');
    blobGrad.addColorStop(0.75, '#00A86B');
    blobGrad.addColorStop(1, '#007A4D');
    ctx.fillStyle = blobGrad;
    ctx.fill();

    // === Draw the tendril — starts INSIDE the blob for seamless overlap ===
    if (stretch > 0.05) {
      // Overlap origin inside the blob body so there's zero seam
      const overlapX = blobX + Math.cos(angle) * bodyR * 0.5;
      const overlapY = blobY + Math.sin(angle) * bodyR * 0.5;
      const overlapL = { x: overlapX + Math.cos(perp) * neckBase * 1.1, y: overlapY + Math.sin(perp) * neckBase * 1.1 };
      const overlapR = { x: overlapX - Math.cos(perp) * neckBase * 1.1, y: overlapY - Math.sin(perp) * neckBase * 1.1 };

      // Tip edge points
      const tipL = { x: tipX + Math.cos(perp) * neckTip, y: tipY + Math.sin(perp) * neckTip };
      const tipR = { x: tipX - Math.cos(perp) * neckTip, y: tipY - Math.sin(perp) * neckTip };

      // Bezier control point distances
      const cpDist = tendrilDist * 0.4;
      const cpL2 = { x: tipL.x - Math.cos(angle) * cpDist * 0.5, y: tipL.y - Math.sin(angle) * cpDist * 0.5 };
      const cpR2 = { x: tipR.x - Math.cos(angle) * cpDist * 0.5, y: tipR.y - Math.sin(angle) * cpDist * 0.5 };

      ctx.beginPath();
      ctx.moveTo(overlapL.x, overlapL.y);
      // Left side of tendril
      ctx.bezierCurveTo(
        overlapL.x + Math.cos(angle) * cpDist,
        overlapL.y + Math.sin(angle) * cpDist,
        cpL2.x, cpL2.y,
        tipL.x, tipL.y
      );
      // Round tip
      ctx.arc(tipX, tipY, neckTip, perp, perp + Math.PI, false);
      // Right side back
      ctx.bezierCurveTo(
        cpR2.x, cpR2.y,
        overlapR.x + Math.cos(angle) * cpDist,
        overlapR.y + Math.sin(angle) * cpDist,
        overlapR.x, overlapR.y
      );
      // Close back through the blob interior
      ctx.quadraticCurveTo(
        overlapX - Math.cos(angle) * 10,
        overlapY - Math.sin(angle) * 10,
        overlapL.x, overlapL.y
      );
      ctx.closePath();

      // Gradient along the tendril length — continuous with body colors
      const tendrilGrad = ctx.createLinearGradient(blobX, blobY, tipX, tipY);
      tendrilGrad.addColorStop(0, '#00C882');
      tendrilGrad.addColorStop(0.5, '#00A86B');
      tendrilGrad.addColorStop(1, '#007A4D');
      ctx.fillStyle = tendrilGrad;
      ctx.fill();

      // Specular highlight on tendril for 3D roundness
      ctx.beginPath();
      const hiliteW = neckBase * 0.3;
      const hiliteX = blobX + Math.cos(angle) * bodyR + Math.cos(perp) * hiliteW;
      const hiliteY = blobY + Math.sin(angle) * bodyR + Math.sin(perp) * hiliteW;
      const hiliteEndX = tipX + Math.cos(perp) * neckTip * 0.3;
      const hiliteEndY = tipY + Math.sin(perp) * neckTip * 0.3;
      ctx.moveTo(hiliteX, hiliteY);
      ctx.lineTo(hiliteEndX, hiliteEndY);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = hiliteW * 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // === Blob specular highlight on top ===
    ctx.beginPath();
    ctx.save();
    ctx.translate(blobX - bodyR * 0.22, blobY - bodyR * 0.28);
    ctx.scale(bodyR * 0.45, bodyR * 0.28);
    ctx.arc(0, 0, 1, 0, Math.PI * 2);
    ctx.restore();
    const specGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
    specGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
    specGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.save();
    ctx.translate(blobX - bodyR * 0.22, blobY - bodyR * 0.28);
    ctx.scale(bodyR * 0.45, bodyR * 0.28);
    ctx.fillStyle = specGrad;
    ctx.fill();
    ctx.restore();

    // === Drop shadow under everything ===
    ctx.save();
    ctx.globalCompositeOperation = 'destination-over';
    ctx.beginPath();
    ctx.arc(blobX, blobY, bodyR + 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,200,130,0.12)';
    ctx.filter = 'blur(15px)';
    ctx.fill();
    ctx.filter = 'none';
    ctx.restore();

    ctx.restore();
  }

  // Stretch animation loop (runs alongside main physics loop)
  function stretchRenderLoop() {
    requestAnimationFrame(stretchRenderLoop);

    if (!stretchActive && springStretch.isSettled()) {
      // Nothing to render, clear canvas
      const canvasRect = zone.getBoundingClientRect();
      stretchCtx.clearRect(0, 0, canvasRect.width, canvasRect.height);
      return;
    }

    springStretch.update();

    const center = getBlobCenter();
    const stretch = Math.max(0, springStretch.value);

    if (stretch < 0.01) {
      // Done retracting — hide canvas, show blob body
      const canvasRect = zone.getBoundingClientRect();
      stretchCtx.clearRect(0, 0, canvasRect.width, canvasRect.height);
      if (!stretchActive) {
        blobBody.style.opacity = '1';
        shadow.style.opacity = '';
        document.querySelector('.mint-glow').style.opacity = '';
        // Reset stretch expression
        if (currentExpression !== 'idle' && currentExpression !== 'happy') {
          setExpression('idle');
        }
      }
      return;
    }

    // Keep blob body hidden while canvas is drawing
    blobBody.style.opacity = '0';
    shadow.style.opacity = '0';
    document.querySelector('.mint-glow').style.opacity = '0';

    // Calculate finger position (during drag: actual finger, during retract: last known angle)
    let fx, fy;
    if (stretchActive) {
      const zoneRect = zone.getBoundingClientRect();
      fx = stretchFingerX - zoneRect.left;
      fy = stretchFingerY - zoneRect.top;
    } else {
      // Retracting: project from center along last angle
      const retractDist = stretch * MAX_STRETCH_DIST;
      fx = center.x + Math.cos(stretchAngle) * retractDist;
      fy = center.y + Math.sin(stretchAngle) * retractDist;
    }

    drawStretchBlob(center.x, center.y, fx, fy, stretch);

    // Face expression based on stretch amount
    if (stretch > 0.02) {
      if (stretch < 0.35) {
        if (currentExpression !== 'thinking') setExpression('thinking');
      } else if (stretch < 0.7) {
        if (currentExpression !== 'surprised') setExpression('surprised');
      } else {
        if (currentExpression !== 'excited') setExpression('excited');
      }

      // Eyes look toward stretch direction
      const eyeOx = Math.cos(stretchAngle) * MAX_PUPIL_OFFSET;
      const eyeOy = Math.sin(stretchAngle) * MAX_PUPIL_OFFSET;
      setPupilOffset(eyeOx, eyeOy);
    }
  }
  requestAnimationFrame(stretchRenderLoop);

  // ═══════════════════════════════════════════════════════
  // MAIN ANIMATION LOOP — runs continuously via rAF
  // ═══════════════════════════════════════════════════════
  let lastFrameTime = performance.now();

  function physicsLoop(now) {
    requestAnimationFrame(physicsLoop);

    const dt = Math.min((now - lastFrameTime) / 16.67, 3); // normalize to ~60fps, cap at 3x
    lastFrameTime = now;

    // Advance morph time
    morphTime += 0.008 * dt;

    // Update all springs
    springPosX.update();
    springPosY.update();
    springScaleX.update();
    springScaleY.update();
    springRotation.update();
    springFloat.update();
    springEyeX.update();
    springEyeY.update();
    springJiggle1.update();
    springJiggle2.update();

    // Idle floating (gentle sine-driven target)
    if (!isDragging && !isPressed) {
      springFloat.target = Math.sin(now * 0.002) * 8;
    }

    // ─── Apply transforms ───

    // Position (drag or spring-return + float)
    const px = springPosX.value;
    const py = springPosY.value + springFloat.value;

    // Deformation with volume conservation
    let sx = springScaleX.value;
    let sy = springScaleY.value;

    // Add jiggle on top
    sx += springJiggle1.value * 0.15;
    sy -= springJiggle1.value * 0.15; // opposite for volume conservation
    sx -= springJiggle2.value * 0.08;
    sy += springJiggle2.value * 0.08;

    const rot = springRotation.value;

    // Apply to wrapper (position)
    wrapper.style.transform = `translate(${px}px, ${py}px)`;

    // Apply to blob (deformation + rotation)
    blob.style.transform = `scale(${sx}, ${sy}) rotate(${rot}deg)`;

    // Organic blob shape morph
    blobBody.style.borderRadius = getOrganicBorderRadius(morphTime);

    // Shadow reacts to height/position
    const shadowScale = 1 - Math.abs(springFloat.value) * 0.008;
    const shadowOpacity = 0.25 - Math.abs(springFloat.value) * 0.008;
    shadow.style.transform = `translateX(-50%) scaleX(${shadowScale + (sx - 1) * 0.3}) scaleY(${Math.max(0.3, shadowScale)})`;
    shadow.style.opacity = Math.max(0.1, shadowOpacity);

    // Face lags behind body (secondary motion!)
    springEyeX.target = (springScaleX.value - 1) * -15 + springRotation.value * 0.3;
    springEyeY.target = (springScaleY.value - 1) * -10;

    // Face is now outside wrapper — position it over blob center
    const wrapperRect = wrapper.getBoundingClientRect();
    const zoneRect = zone.getBoundingClientRect();
    const faceCenterX = wrapperRect.left - zoneRect.left + wrapperRect.width / 2 - 90;
    const faceCenterY = wrapperRect.top - zoneRect.top + wrapperRect.height / 2 - 90;
    face.style.left = faceCenterX + springEyeX.value + 'px';
    face.style.top = faceCenterY + springEyeY.value + 'px';
  }

  requestAnimationFrame(physicsLoop);

  // ═══════════════════════════════════════════════════════
  // TOUCH/MOUSE INTERACTION
  // ═══════════════════════════════════════════════════════

  function getXY(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  let lastTapTime = 0;
  let tapTimer = null;

  function handlePointerDown(e) {
    if (e.target === chatInput || e.target === sendBtn || e.target.closest('.send-btn') || e.target.closest('.login-btn')) return;

    const { x, y } = getXY(e);
    tapTouchX = x;
    tapTouchY = y;
    dragStartX = x;
    dragStartY = y;
    isDragging = true;
    isPressed = true;
    pressStartTime = performance.now();
    stretchDragStarted = false;

    // Reset velocity history
    velocityHistory.length = 0;
    lastDragX = x;
    lastDragY = y;
    lastDragTime = performance.now();

    // SQUISH! — press down like putty
    springScaleX.target = 1.25;
    springScaleY.target = 0.75;
    springFloat.target = 0; // stop floating when held

    // Trigger jiggle impulse
    springJiggle1.impulse(0.3);
  }

  function handlePointerMove(e) {
    if (!isDragging) return;
    e.preventDefault();

    const { x, y } = getXY(e);
    const now = performance.now();

    // Track velocity
    const dtMs = now - lastDragTime;
    if (dtMs > 0) {
      const vx = (x - lastDragX) / dtMs * 16;
      const vy = (y - lastDragY) / dtMs * 16;
      velocityHistory.push({ vx, vy, t: now });
      if (velocityHistory.length > VELOCITY_SAMPLES) velocityHistory.shift();
    }
    lastDragX = x;
    lastDragY = y;
    lastDragTime = now;

    // Distance from drag start
    const totalDx = x - dragStartX;
    const totalDy = y - dragStartY;
    const totalDist = Math.hypot(totalDx, totalDy);

    // Switch to stretch mode after moving 12px (not a tap)
    if (!stretchDragStarted && totalDist > 12) {
      stretchDragStarted = true;
      stretchActive = true;
      // Reset position springs (blob stays centered)
      springPosX.target = 0;
      springPosY.value = 0;
      springPosX.value = 0;
      springPosY.target = 0;
      springScaleX.target = 1;
      springScaleY.target = 1;
      springRotation.target = 0;
    }

    if (stretchDragStarted) {
      // === STRETCH MODE — blob stays put, surface stretches ===
      stretchFingerX = x;
      stretchFingerY = y;

      // Lock position springs to center
      springPosX.value = 0; springPosX.target = 0; springPosX.velocity = 0;
      springPosY.value = 0; springPosY.target = 0; springPosY.velocity = 0;
      springScaleX.value = 1; springScaleX.target = 1; springScaleX.velocity = 0;
      springScaleY.value = 1; springScaleY.target = 1; springScaleY.velocity = 0;
      springRotation.value = 0; springRotation.target = 0; springRotation.velocity = 0;

      // Calculate stretch amount (0 to 1)
      const center = getBlobCenter();
      const zoneRect = zone.getBoundingClientRect();
      const fx = x - zoneRect.left;
      const fy = y - zoneRect.top;
      const distFromCenter = Math.hypot(fx - center.x, fy - center.y);

      // Stretch starts from the surface of the blob
      const distFromSurface = Math.max(0, distFromCenter - BLOB_RADIUS * 0.3);
      const stretchAmt = Math.min(distFromSurface / MAX_STRETCH_DIST, 1);

      springStretch.value = stretchAmt;
      springStretch.target = stretchAmt;
      springStretch.velocity = 0; // no spring during active drag

      stretchAngle = Math.atan2(fy - center.y, fx - center.x);
    }
  }

  function handlePointerUp(e) {
    if (!isDragging) return;

    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const dx = Math.abs(pt.clientX - dragStartX);
    const dy = Math.abs(pt.clientY - dragStartY);

    isDragging = false;
    isPressed = false;

    if (stretchDragStarted) {
      // === RELEASE STRETCH ===
      stretchActive = false;
      stretchDragStarted = false;

      const releasedStretch = springStretch.value;

      // Snap the stretch spring back to 0
      springStretch.target = 0;
      // Extra velocity for snappy snap-back — the more stretched, the more satisfying
      springStretch.velocity = -releasedStretch * 1.8;

      // JIGGLE the blob body on snap-back — this is the payoff
      const snapForce = releasedStretch;
      springJiggle1.impulse(snapForce * 2.5);
      springJiggle2.impulse(-snapForce * 2.0);
      springScaleX.impulse(snapForce * 0.4);
      springScaleY.impulse(-snapForce * 0.4);

      // Extra big snap if stretched far
      if (releasedStretch > 0.7) {
        springJiggle1.impulse(snapForce * 1.5);
        springJiggle2.impulse(-snapForce * 1.0);
        // Small position bounce away from stretch direction
        springPosX.impulse(-Math.cos(stretchAngle) * snapForce * 8);
        springPosY.impulse(-Math.sin(stretchAngle) * snapForce * 8);
      }

      // Reset deformation
      springScaleX.target = 1;
      springScaleY.target = 1;
      springRotation.target = 0;
      springPosX.target = 0;
      springPosY.target = 0;

      resetIdle();
      return;
    }

    // === NOT A STRETCH — regular release (tap/quick drag) ===

    // Calculate release velocity from history
    let releaseVX = 0, releaseVY = 0;
    if (velocityHistory.length > 0) {
      for (const v of velocityHistory) {
        releaseVX += v.vx;
        releaseVY += v.vy;
      }
      releaseVX /= velocityHistory.length;
      releaseVY /= velocityHistory.length;
    }

    // Spring back to center
    springPosX.target = 0;
    springPosY.target = 0;

    // Reset deformation
    springScaleX.target = 1;
    springScaleY.target = 1;
    springRotation.target = 0;

    // Release pop
    const releaseSpeed = Math.sqrt(releaseVX * releaseVX + releaseVY * releaseVY);
    const popForce = Math.min(0.15 + releaseSpeed * 0.03, 0.5);
    springScaleX.impulse(-popForce * 0.8);
    springScaleY.impulse(popForce);
    springJiggle1.impulse(popForce * 2);
    springJiggle2.impulse(-popForce * 1.5);

    // Tap detection
    if (dx < 10 && dy < 10) {
      const now = Date.now();
      if (now - lastTapTime < 300) {
        clearTimeout(tapTimer);
        doDoubleTap();
        lastTapTime = 0;
      } else {
        lastTapTime = now;
        tapTimer = setTimeout(() => { doSingleTap(); lastTapTime = 0; }, 300);
      }
    }

    resetIdle();
  }

  // ═══════════════════════════════════════════════════════
  // ZONE DETECTION
  // ═══════════════════════════════════════════════════════
  const armLeft = document.getElementById('arm-left');
  const armRight = document.getElementById('arm-right');

  function getZone(touchX, touchY) {
    const rect = blobBody.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const relX = touchX - cx;
    const relY = touchY - cy;
    const relXNorm = relX / (rect.width / 2);
    const relYNorm = relY / (rect.height / 2);

    // Face zone: center region
    if (Math.abs(relXNorm) < 0.4 && relYNorm > -0.3 && relYNorm < 0.3) return 'face';
    // Head: top quarter
    if (relYNorm < -0.4) return 'head';
    // Bottom: bottom quarter
    if (relYNorm > 0.4) return 'bottom';
    // Left/right sides
    if (relXNorm < -0.3) return 'left';
    if (relXNorm > 0.3) return 'right';
    // Default center
    return 'belly';
  }

  function doTickleJitter() {
    jitterCount = 0;
    clearInterval(jitterTimer);

      if (jitterCount >= 4) { clearInterval(jitterTimer); return; }
      const dir = jitterCount % 2 === 0 ? 1 : -1;
      springScaleX.impulse(dir * 0.12);
      springJiggle1.impulse(dir * 0.4);
      springJiggle2.impulse(-dir * 0.3);
      jitterCount++;
    }, 90);

  // ═══════════════════════════════════════════════════════
  // ZONE-BASED TAP REACTIONS
  // ═══════════════════════════════════════════════════════
  function doZoneTap(zone, x, y) {
    spawnRipple(x, y, zone);
    showBubble(pick(zoneBubbles[zone]));
    resetIdle();

    switch (zone) {
      case 'head':
        // Gentle tilt forward, shy expression
        springScaleY.velocity -= 0.03;
        springScaleX.velocity += 0.02;
        springRotation.impulse(4);
        springPosY.impulse(1.5);
        springJiggle1.impulse(0.15);
        setExpressionZone('shy');
        setTimeout(() => { resetBlush(); setExpression('idle'); }, 2000);
        spawnParticles(3);
        break;

      case 'belly':
        // TICKLISH — rapid jitter, laugh expression
        setExpressionZone('tickle');
        doTickleJitter();
        springScaleX.impulse(0.08);
        springScaleY.impulse(-0.06);
        spawnParticles(6);
        setTimeout(() => {
          setExpression('happy');
          setTimeout(() => setExpression('idle'), 1200);
        }, 1000);
        break;

      case 'left':
        // Lurch RIGHT (away from left poke)
        springPosX.velocity += 15;
        springScaleX.velocity += 0.15;
        springJiggle1.impulse(0.6);
        springJiggle2.impulse(-0.4);
        setExpression('surprised');
        setTimeout(() => {
          setExpression('happy');
          setTimeout(() => setExpression('idle'), 1200);
        }, 500);
        spawnParticles(4);
        break;

      case 'right':
        // Lurch LEFT (away from right poke)
        springPosX.velocity -= 15;
        springScaleX.velocity += 0.15;
        springJiggle1.impulse(-0.6);
        springJiggle2.impulse(0.4);
        setExpression('surprised');
        setTimeout(() => {
          setExpression('happy');
          setTimeout(() => setExpression('idle'), 1200);
        }, 500);
        spawnParticles(4);
        break;

      case 'bottom':
        // BIG upward launch
        springPosY.velocity -= 22;
        bottomLaunchActive = true;
        // Stretch tall at launch
        springScaleY.impulse(0.25);
        springScaleX.impulse(-0.15);
        setExpression('excited');
        spawnParticles(8);

        // Landing squish detection — poll until returning down
        let launchCheck = setInterval(() => {
          if (bottomLaunchActive && springPosY.velocity > 0 && springPosY.value < 5) {
            // Landing! Big squish
            springScaleY.impulse(-0.35);
            springScaleX.impulse(0.3);
            springJiggle1.impulse(0.8);
            springJiggle2.impulse(-0.6);
            bottomLaunchActive = false;
            clearInterval(launchCheck);
            setTimeout(() => {
              setExpression('happy');
              setTimeout(() => setExpression('idle'), 1200);
            }, 400);
          }
        }, 16);
        // Safety timeout
        setTimeout(() => { clearInterval(launchCheck); bottomLaunchActive = false; }, 2000);
        break;

      case 'face':
        // Cover face with arms, cross eyes
        coverFace();
        setExpressionZone('crosseyed');
        springScaleX.impulse(0.08);
        springScaleY.impulse(-0.06);
        springJiggle1.impulse(0.3);
        spawnParticles(4);
        setTimeout(() => {
          setExpression('surprised');
          setTimeout(() => setExpression('idle'), 1200);
        }, 800);
        break;
    }
  }

  function doSingleTap() {

    springScaleX.impulse(0.3);

    springJiggle2.impulse(-0.8);

    setExpression('excited');
    setTimeout(() => {

      setTimeout(() => setExpression('idle'), 1500);
    }, 700);

    showBubble("Let's GOOO! 🔥");
    spawnParticles(10);
    resetIdle();
  }

  // PUPIL MOVEMENT
  // ═══════════════════════════════════════════════════════
  function setPupilOffset(ox, oy) {
    eyeLeftPupil.setAttribute('cx', LEFT_EYE.cx + ox);
    eyeLeftPupil.setAttribute('cy', LEFT_EYE.cy + oy);
    eyeRightPupil.setAttribute('cx', RIGHT_EYE.cx + ox);
    eyeRightPupil.setAttribute('cy', RIGHT_EYE.cy + oy);
    eyeLeftHighlight.setAttribute('cx', LEFT_EYE.cx + ox + 4);
    eyeLeftHighlight.setAttribute('cy', LEFT_EYE.cy + oy - 5);
    eyeRightHighlight.setAttribute('cx', RIGHT_EYE.cx + ox + 4);
    eyeRightHighlight.setAttribute('cy', RIGHT_EYE.cy + oy - 5);
  }

  function trackEyes(clientX, clientY) {
    const rect = wrapper.getBoundingClientRect();
    const blobCX = rect.left + rect.width / 2;
    const blobCY = rect.top + rect.height / 2;
    const dx = clientX - blobCX;
    const dy = clientY - blobCY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const maxDist = Math.max(window.innerWidth, window.innerHeight);
    const factor = Math.min(dist / maxDist * 3, 1);
    const ox = (dx / dist) * MAX_PUPIL_OFFSET * factor;
    const oy = (dy / dist) * MAX_PUPIL_OFFSET * factor;
    setPupilOffset(ox, oy);
  }

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    isTrackingMouse = true;
    if (currentExpression !== 'thinking' && currentExpression !== 'happy') {
      trackEyes(e.clientX, e.clientY);
    }
    resetIdleEyes();
  });

  document.addEventListener('touchmove', (e) => {
    if (e.touches.length) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
      isTrackingMouse = true;
      if (currentExpression !== 'thinking' && currentExpression !== 'happy') {
        trackEyes(e.touches[0].clientX, e.touches[0].clientY);
      }
    }
  }, { passive: true });

  // IDLE EYE WANDERING
  // ═══════════════════════════════════════════════════════
  let idleEyeTimer;
  let eyeWanderTimer;

  function wanderEyes() {
    if (isTrackingMouse || currentExpression === 'thinking') return;
    const targets = [
      { x: -4, y: -2 }, { x: 4, y: -2 },
      { x: -3, y: 2 },  { x: 3, y: 2 },
      { x: 0, y: -4 },  { x: 0, y: 0 },
      { x: -5, y: 0 },  { x: 5, y: 0 },
    ];
    const t = targets[Math.floor(Math.random() * targets.length)];
    setPupilOffset(t.x, t.y);
  }

  function startEyeWander() {
    eyeWanderTimer = setInterval(wanderEyes, 2000 + Math.random() * 1500);
  }
  startEyeWander();

  function resetIdleEyes() {
    clearTimeout(idleEyeTimer);
    idleEyeTimer = setTimeout(() => {
      isTrackingMouse = false;
      startEyeWander();
    }, 3000);
    clearInterval(eyeWanderTimer);
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function showThinking() {
    bubble.classList.remove('pop', 'hidden');
    bubble.innerHTML = '<span class="thinking-dots"><span></span><span></span><span></span></span>';
    void bubble.offsetWidth;
    bubble.classList.add('pop');

  function detectIgHandle(text) {
    const atMatch = text.match(/@([a-zA-Z0-9_.]{1,30})/);
    if (atMatch) return atMatch[1];
    if (hasAskedForHandle) {
      const cleaned = text.trim().replace(/^@/, '');
      if (/^[a-zA-Z0-9_.]{2,30}$/.test(cleaned) && !cleaned.includes(' ')) return cleaned;
    }
    return null;
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text || isSending) return;

    isSending = true;
    sendBtn.disabled = true;
    chatInput.value = '';

    addMessage(text, 'user');
    conversationHistory.push({ role: 'user', content: text });

    const handle = detectIgHandle(text);
    showThinking();

    // Squish on send via spring impulse
    springScaleX.impulse(0.15);
    springScaleY.impulse(-0.2);
    springJiggle1.impulse(0.4);

    try {
      const resp = await fetch(CONVEX_URL, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          message: text + (handle ? ` (my instagram handle is @${handle})` : ''),
          context: 'getminted',
          threadId: threadId
        })
      });

      const newThreadId = resp.headers.get('X-Thread-Id');
      if (newThreadId) threadId = newThreadId;

      const reply = (await resp.text()) || "Hmm, my brain glitched. Try again? 😅";
      conversationHistory.push({ role: 'assistant', content: reply });

      if (/handle|instagram|ig |@|username|what'?s your/i.test(reply)) {
        hasAskedForHandle = true;
      }

      // Happy bounce on reply
      setExpression('happy');
      springScaleX.impulse(-0.1);
      springScaleY.impulse(0.12);
      springJiggle1.impulse(0.3);
      setTimeout(() => setExpression('idle'), 2000);

      addMessage(reply, 'mint');
      showBubble(reply.length > 50 ? reply.slice(0, 47) + '...' : reply);

      if (handle) {
        spawnParticles(12);
        // Excited spin via rotation impulse
        springRotation.impulse(25);
        springScaleX.impulse(0.25);
        springScaleY.impulse(-0.3);
        springJiggle1.impulse(1.0);
        springJiggle2.impulse(-0.7);
        setExpression('excited');

        setTimeout(() => {
          showBubble("Building your site... 🚀");
        }, 1500);

        setTimeout(() => {
          window.location.href = 'https://getminted.ai/dashboard/';
        }, 2800);
      }

    } catch (err) {
      console.error('API error:', err);
      const fallback = "Oops, bad signal! Try that again? 📡";
      addMessage(fallback, 'mint');
      showBubble(fallback);
      setExpression('surprised');
      springScaleX.impulse(0.1);
      springScaleY.impulse(0.15);
      setTimeout(() => setExpression('idle'), 1500);
    }

    isSending = false;
    sendBtn.disabled = false;
    resetIdle();
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ═══════════════════════════════════════════════════════
  // SPEECH BUBBLE
  // ═══════════════════════════════════════════════════════
  function showBubble(text) {
    bubble.classList.remove('pop', 'hidden');
    bubble.textContent = text;
    void bubble.offsetWidth;
    bubble.classList.add('pop');
  }

  // ═══════════════════════════════════════════════════════
  // IDLE TIMER
  // ═══════════════════════════════════════════════════════
  let idleTimer = null;
  const nudges = [
    "Go ahead, type something! 👇",
    "Don't be shy, I don't bite 😄",
    "I'm here whenever you're ready 💚"
  ];
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function resetIdle() {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      if (!isDragging && conversationHistory.length === 0) {
        setPupilOffset(0, 0);
        browLeft.setAttribute('d', 'M50,58 Q62,50 74,58');
        browRight.setAttribute('d', 'M106,58 Q118,50 130,58');
        showBubble(pick(nudges));

        // Gentle attention-getting bounce
        springScaleX.impulse(0.06);
        springScaleY.impulse(-0.08);
        springJiggle1.impulse(0.2);

        setTimeout(() => {
          browLeft.setAttribute('d', 'M52,62 Q62,56 72,60');
          browRight.setAttribute('d', 'M108,60 Q118,56 128,62');
        }, 3000);
      }
    }, 4000);
  }
  resetIdle();

  // ═══════════════════════════════════════════════════════
  // PARTICLES
  // ═══════════════════════════════════════════════════════
  function spawnParticles(count) {
    const rect = wrapper.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 60 + Math.random() * 50;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      const size = 4 + Math.random() * 5;
      p.style.width = size + 'px'; p.style.height = size + 'px';
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      p.style.opacity = '1';
      p.style.transition = `all ${0.4 + Math.random() * 0.3}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
      document.body.appendChild(p);
      requestAnimationFrame(() => { p.style.transform = `translate(${tx}px, ${ty}px)`; p.style.opacity = '0'; });
      setTimeout(() => p.remove(), 800);
    }
  }

  // ═══════════════════════════════════════════════════════
  // EVENT LISTENERS
  // ═══════════════════════════════════════════════════════
  // Touch/mouse on the wrapper to START the interaction
  wrapper.addEventListener('touchstart', handlePointerDown, { passive: true });
  wrapper.addEventListener('mousedown', handlePointerDown);

  // Move & up on the whole document so stretch can go beyond the blob
  document.addEventListener('touchmove', (e) => {
    if (isDragging) handlePointerMove(e);
  }, { passive: false });
  document.addEventListener('touchend', handlePointerUp, { passive: true });
  document.addEventListener('mousemove', (e) => {
    if (isDragging) handlePointerMove(e);
  });
  document.addEventListener('mouseup', handlePointerUp);

  // Layout bubble above character
  function layoutBubble() {
    const zoneRect = zone.getBoundingClientRect();
    const wrapperRect = wrapper.getBoundingClientRect();
    const bubbleTop = wrapperRect.top - zoneRect.top - 55;
    bubble.style.top = Math.max(5, bubbleTop) + 'px';
  }
  layoutBubble();
  window.addEventListener('resize', layoutBubble);
  setInterval(layoutBubble, 200);

  chatInput.addEventListener('focus', () => { resetIdle(); });

  // Init
  setExpression('idle');

})();
</script>
</body>
</html>
